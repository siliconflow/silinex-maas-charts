apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "silinex-maas-frontend.fullname" . }}
  labels:
    {{- include "silinex-maas-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "silinex-maas-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "silinex-maas-frontend.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "silinex-maas-frontend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "silinex-maas-frontend.fullname" . }}
            - secretRef:
                name: {{ include "silinex-maas-frontend.secretName" . }}
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: {{ .Values.config.NODE_EXTRA_CA_CERTS | toString | quote }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: {{ .Values.config.NODE_TLS_REJECT_UNAUTHORIZED | toString | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.trustedCa.enabled }}
          volumeMounts:
            - name: trusted-ca
              mountPath: {{ .Values.trustedCa.mountPath }}
              readOnly: true
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.trustedCa.enabled }}
      volumes:
        - name: trusted-ca
          secret:
            secretName: {{ .Values.trustedCa.secretName }}
            optional: {{ .Values.trustedCa.optional }}
            items:
              - key: {{ .Values.trustedCa.secretKey }}
                path: {{ .Values.trustedCa.fileName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
