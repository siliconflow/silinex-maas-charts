apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "silinex-maas-frontend.fullname" . }}
  labels:
    {{- include "silinex-maas-frontend.labels" . | nindent 4 }}
data:
  {{- range $name, $value := .Values.config }}
  {{- if ne $name "extraEnv" }}
  {{- if eq $name "AUTH_CALLBACK_URL" }}
  {{ $name }}: {{ default (include "silinex-maas-frontend.authCallbackUrl" $) $value | toString | quote }}
  {{- else if eq $name "LOGTO_ENDPOINT" }}
  {{ $name }}: {{ default (include "silinex-maas-frontend.logtoEndpoint" $) $value | toString | quote }}
  {{- else }}
  {{ $name }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- range $name, $value := .Values.config.extraEnv }}
  {{ $name }}: {{ $value | toString | quote }}
  {{- end }}
