{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "silinex-node-agent-ascend.clusterRoleName" . }}
  labels:
    {{- include "silinex-node-agent-ascend.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - nodes/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "silinex-node-agent-ascend.clusterRoleBindingName" . }}
  labels:
    {{- include "silinex-node-agent-ascend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "silinex-node-agent-ascend.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "silinex-node-agent-ascend.serviceAccountName" . }}
    namespace: {{ include "silinex-node-agent-ascend.namespace" . }}
{{- end }}
