{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "silinex-node-agent-ascend.serviceAccountName" . }}
  namespace: {{ include "silinex-node-agent-ascend.namespace" . }}
  labels:
    {{- include "silinex-node-agent-ascend.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
