{{- if .Values.tls.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "silinex-maas-nginx.tlsSecretName" . }}
  labels:
    {{- include "silinex-maas-nginx.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Files.Get .Values.tls.certFile | b64enc }}
  tls.key: {{ .Files.Get .Values.tls.keyFile | b64enc }}
{{- end }}
