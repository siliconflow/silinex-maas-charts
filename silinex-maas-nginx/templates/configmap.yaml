apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "silinex-maas-nginx.fullname" . }}
  labels:
    {{- include "silinex-maas-nginx.labels" . | nindent 4 }}
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    {{- if .Values.nginx.resolver }}
    resolver {{ .Values.nginx.resolver }} valid={{ .Values.nginx.resolverValid }} ipv6=off;
    resolver_timeout {{ .Values.nginx.resolverTimeout }};
    {{- end }}

    server {
        listen {{ .Values.nginx.containerPorts.aggregateHttps }} ssl;
        server_name {{ include "silinex-maas-nginx.managementPlaneHost" . }} _;

        set $silinex_maas_api "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.maasApi.host) }}:{{ .Values.upstreams.maasApi.port }}";
        set $silinex_maas_server "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.maasServer.host) }}:{{ .Values.upstreams.maasServer.port }}";
        set $silinex_maas_frontend "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.maasFrontend.host) }}:{{ .Values.upstreams.maasFrontend.port }}";
        set $silinex_maas_docs "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.maasDocs.host) }}:{{ .Values.upstreams.maasDocs.port }}";

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        ssl_protocols {{ .Values.nginx.sslProtocols }};
        ssl_ciphers {{ .Values.nginx.sslCiphers }};
        ssl_prefer_server_ciphers on;

        client_max_body_size {{ .Values.nginx.clientMaxBodySize }};

        location ^~ /v1/ {
            proxy_pass http://$silinex_maas_api;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.aggregateHttps | default .Values.service.ports.aggregateHttps }};
            proxy_buffering off;
            proxy_read_timeout {{ .Values.nginx.longProxyReadTimeout }};
            proxy_connect_timeout {{ .Values.nginx.proxyConnectTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }

        location ^~ /silinex/ {
            proxy_pass http://$silinex_maas_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.aggregateHttps | default .Values.service.ports.aggregateHttps }};
            proxy_buffering off;
            proxy_read_timeout {{ .Values.nginx.longProxyReadTimeout }};
            proxy_connect_timeout {{ .Values.nginx.proxyConnectTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }

        location ^~ /documents {
            proxy_pass http://$silinex_maas_docs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.aggregateHttps | default .Values.service.ports.aggregateHttps }};
            proxy_read_timeout {{ .Values.nginx.proxyReadTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }

        location / {
            proxy_pass http://$silinex_maas_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.aggregateHttps | default .Values.service.ports.aggregateHttps }};
            proxy_read_timeout {{ .Values.nginx.proxyReadTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }
    }

    server {
        listen {{ .Values.nginx.containerPorts.appHttps }} ssl;
        server_name {{ include "silinex-maas-nginx.managementPlaneHost" . }} _;

        set $logto_app "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.logtoApp.host) }}:{{ .Values.upstreams.logtoApp.port }}";

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        ssl_protocols {{ .Values.nginx.sslProtocols }};
        ssl_ciphers {{ .Values.nginx.sslCiphers }};
        ssl_prefer_server_ciphers on;

        client_max_body_size {{ .Values.nginx.clientMaxBodySize }};

        location = /api/swagger.json {
            return 403;
        }

        location ~* \.js\.map$ {
            deny all;
        }

        location / {
            proxy_pass http://$logto_app;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.appHttps | default .Values.service.ports.appHttps }};
            proxy_read_timeout {{ .Values.nginx.proxyReadTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }
    }

    server {
        listen {{ .Values.nginx.containerPorts.adminHttps }} ssl;
        server_name {{ include "silinex-maas-nginx.managementPlaneHost" . }} _;

        set $logto_admin "{{ include "silinex-maas-nginx.upstreamHost" (dict "root" . "host" .Values.upstreams.logtoAdmin.host) }}:{{ .Values.upstreams.logtoAdmin.port }}";

        ssl_certificate /etc/nginx/ssl/tls.crt;
        ssl_certificate_key /etc/nginx/ssl/tls.key;
        ssl_protocols {{ .Values.nginx.sslProtocols }};
        ssl_ciphers {{ .Values.nginx.sslCiphers }};
        ssl_prefer_server_ciphers on;

        client_max_body_size {{ .Values.nginx.clientMaxBodySize }};

        location / {
            proxy_pass http://$logto_admin;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port {{ .Values.service.nodePorts.adminHttps | default .Values.service.ports.adminHttps }};
            proxy_read_timeout {{ .Values.nginx.proxyReadTimeout }};
            proxy_send_timeout {{ .Values.nginx.proxySendTimeout }};
        }
    }
