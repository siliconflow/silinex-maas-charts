{{- if and .Values.secret.create (not .Values.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logto.secretName" . }}
  labels:
    {{- include "logto.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_URL: {{ .Values.secret.dbUrl | quote }}
  {{- with .Values.secret.extraStringData }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
