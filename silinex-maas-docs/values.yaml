replicaCount: 1

global:
  imageRegistry: registry.inner.silinex.work/silinex-maas
  managementPlane:
    host: 10.60.30.120
    ports:
      aggregateHttps: 31300

image:
  repository: e-maas-docs
  tag: "amd64-57cdac93-20260426-1831"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

nodeSelector:
  sf-maas-deploy: "true"
tolerations: []
affinity: {}
hostAliases: []

service:
  type: ClusterIP
  port: 16103
  nodePort: ""

config:
  NODE_ENV: production
  API_URL: ""
  PORT: "16103"
  extraEnv: {}

extraEnv: []

livenessProbe:
  enabled: true
