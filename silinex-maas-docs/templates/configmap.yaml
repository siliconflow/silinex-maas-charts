apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "silinex-maas-docs.fullname" . }}
  labels:
    {{- include "silinex-maas-docs.labels" . | nindent 4 }}
data:
  {{- range $name, $value := .Values.config }}
  {{- if ne $name "extraEnv" }}
  {{- if eq $name "API_URL" }}
  {{ $name }}: {{ default (include "silinex-maas-docs.apiUrl" $) $value | toString | quote }}
  {{- else }}
  {{ $name }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- range $name, $value := .Values.config.extraEnv }}
  {{ $name }}: {{ $value | toString | quote }}
  {{- end }}
